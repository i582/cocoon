name: Deploy Docs

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
    branches:
      - main
    paths:
      - ".github/workflows/deploy-docs.yml"
      - "docs/**"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/deploy-docs.yml"
      - "docs/**"
  workflow_dispatch:

concurrency:
  group: deploy-docs-${{ github.ref }}
  cancel-in-progress: false

permissions: {}

jobs:
  build:
    name: Build docs
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0

      - name: Restore Bun cache
        id: bun-cache
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: &build-docs-bun-cache-paths |
            ~/.bun/install/cache
            ${{ github.workspace }}/docs/.next/cache
          key: ${{ runner.os }}-${{ runner.arch }}-bun-docs-${{ hashFiles('docs/bun.lock') }}-${{ hashFiles('docs/**.[jt]s', 'docs/**.[jt]sx', 'docs/content/docs/**') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-bun-docs-${{ hashFiles('docs/bun.lock') }}-

      - name: Install docs dependencies
        working-directory: docs
        run: bun ci

      - name: Generate source
        working-directory: docs
        run: bun run generated-source

      - name: Check docs formatting
        working-directory: docs
        run: bun run fmt:check

      - name: Lint docs
        working-directory: docs
        run: bun run lint

      - name: Build docs
        working-directory: docs
        env:
          NEXT_TELEMETRY_DISABLED: "1"
          GITHUB_PAGES: "true"
        run: bun run build

      - name: Save Bun cache
        if: github.ref == 'refs/heads/main' && steps.bun-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: *build-docs-bun-cache-paths
          key: ${{ steps.bun-cache.outputs.cache-primary-key }}

      - name: Upload GitHub Pages artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: docs/out

  deploy:
    name: Deploy docs
    if: github.ref == 'refs/heads/main'
    needs: [build]
    runs-on: ubuntu-latest

    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
